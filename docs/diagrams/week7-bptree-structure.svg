<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style>
      .title { font: 700 26px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .label { font: 700 18px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; }
      .small { font: 500 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #374151; }
      .tiny { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #475569; }
      .root { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .leaf { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 16; }
      .note { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .leaf-link { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#green-arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="green-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#fffdfa"/>
  <text x="50" y="52" class="title">B+Tree 구조</text>

  <rect x="365" y="85" width="170" height="82" class="root"/>
  <text x="424" y="118" class="label">Root</text>
  <text x="412" y="145" class="small">1 | 2 | 6</text>

  <rect x="105" y="225" width="150" height="78" class="leaf"/>
  <text x="153" y="255" class="label">Leaf</text>
  <text x="159" y="281" class="small">1</text>
  <text x="143" y="300" class="tiny">0x10</text>

  <rect x="375" y="225" width="150" height="78" class="leaf"/>
  <text x="423" y="255" class="label">Leaf</text>
  <text x="429" y="281" class="small">2</text>
  <text x="413" y="300" class="tiny">0x20</text>

  <rect x="645" y="225" width="150" height="78" class="leaf"/>
  <text x="693" y="255" class="label">Leaf</text>
  <text x="699" y="281" class="small">6</text>
  <text x="683" y="300" class="tiny">0x60</text>

  <path d="M405 167 C335 185 245 200 180 225" class="arrow"/>
  <path d="M450 167 L450 225" class="arrow"/>
  <path d="M495 167 C565 185 655 200 720 225" class="arrow"/>

  <path d="M255 264 L375 264" class="leaf-link"/>
  <path d="M525 264 L645 264" class="leaf-link"/>

  <rect x="260" y="318" width="380" height="30" class="note"/>
  <text x="291" y="338" class="tiny">key = 내부 id, value = CSV row offset</text>
</svg>
