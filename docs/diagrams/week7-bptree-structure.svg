<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      .headline { font: 800 78px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #050505; letter-spacing: 0; }
      .subtitle { font: 500 24px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; letter-spacing: 0; }
      .nodeText { font: 700 22px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; }
      .small { font: 600 15px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #374151; }
      .root { fill: #a8b08a; }
      .leaf { fill: #f4cd70; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
      .leafLink { stroke: #111827; stroke-width: 2; stroke-dasharray: 6 7; fill: none; marker-end: url(#arrow); }
      .arrowLine { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#111827"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#f7f7f4"/>

  <text x="74" y="272" class="headline">B+Tree</text>
  <text x="74" y="354" class="headline">Structure</text>
  <text x="78" y="422" class="subtitle">id index path with linked leaf nodes</text>

  <rect x="760" y="160" width="150" height="58" class="root"/>
  <text x="796" y="184" class="small">Root</text>
  <text x="790" y="207" class="nodeText">1 | 2 | 6</text>

  <path d="M835 218 L835 278" class="line"/>
  <path d="M835 278 L640 278" class="line"/>
  <path d="M835 278 L1030 278" class="line"/>
  <path d="M640 278 L640 354" class="arrowLine"/>
  <path d="M835 278 L835 354" class="arrowLine"/>
  <path d="M1030 278 L1030 354" class="arrowLine"/>

  <circle cx="640" cy="382" r="28" class="leaf"/>
  <text x="633" y="390" class="nodeText">1</text>
  <text x="622" y="430" class="small">0x10</text>

  <circle cx="835" cy="382" r="28" class="leaf"/>
  <text x="828" y="390" class="nodeText">2</text>
  <text x="817" y="430" class="small">0x20</text>

  <circle cx="1030" cy="382" r="28" class="leaf"/>
  <text x="1023" y="390" class="nodeText">6</text>
  <text x="1012" y="430" class="small">0x60</text>

  <path d="M668 382 L807 382" class="leafLink"/>
  <path d="M863 382 L1002 382" class="leafLink"/>
</svg>
