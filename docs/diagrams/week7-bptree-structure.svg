<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 19px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #374151; letter-spacing: 1px; }
      .subtitle { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6b7280; }
      .cardTitle { font: 800 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; letter-spacing: .5px; }
      .keyText { font: 700 16px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; }
      .valueText { font: 600 11px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6b7280; }
      .rootRibbon { fill: #facc15; }
      .internalA { fill: #84cc16; }
      .internalB { fill: #2dd4bf; }
      .internalC { fill: #60a5fa; }
      .leafA { fill: #22c55e; }
      .leafB { fill: #38bdf8; }
      .leafC { fill: #a78bfa; }
      .leafD { fill: #f472b6; }
      .card { fill: #fbfdfc; stroke-width: 2; }
      .rootCard { stroke: #facc15; }
      .internalCardA { stroke: #84cc16; }
      .internalCardB { stroke: #2dd4bf; }
      .internalCardC { stroke: #60a5fa; }
      .leafCardA { stroke: #22c55e; }
      .leafCardB { stroke: #38bdf8; }
      .leafCardC { stroke: #a78bfa; }
      .leafCardD { stroke: #f472b6; }
      .treeLine { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#darkArrow); }
      .leafLink { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#greenArrow); }
      .chevron { font: 700 28px 'Segoe UI', sans-serif; fill: #374151; }
    </style>
    <marker id="darkArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#f4f4f2"/>

  <text x="46" y="220" class="title">B+TREE 구조</text>
  <text x="46" y="242" class="subtitle">1 root / 3 internal / 6 leaves</text>
  <text x="46" y="260" class="subtitle">Leaf nodes are linked in sorted order.</text>

  <g transform="translate(270 86)">
    <polygon points="0,0 70,0 88,33 70,66 0,66" class="rootRibbon"/>
    <rect x="70" y="0" width="150" height="66" class="card rootCard"/>
    <text x="25" y="40" class="cardTitle">01</text>
    <text x="94" y="27" class="cardTitle">ROOT</text>
    <text x="94" y="51" class="keyText">3 | 5 | 9</text>
  </g>

  <text x="518" y="130" class="chevron">&gt;</text>

  <g transform="translate(570 34)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalA"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCardA"/>
    <text x="20" y="40" class="cardTitle">02</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">1 | 2</text>
  </g>

  <g transform="translate(570 134)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalB"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCardB"/>
    <text x="20" y="40" class="cardTitle">03</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">4 | 5</text>
  </g>

  <g transform="translate(570 234)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalC"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCardC"/>
    <text x="20" y="40" class="cardTitle">04</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">7 | 9</text>
  </g>

  <path d="M490 119 C525 72 545 67 570 67" class="treeLine"/>
  <path d="M490 119 C525 142 545 167 570 167" class="treeLine"/>
  <path d="M490 119 C525 218 545 267 570 267" class="treeLine"/>

  <text x="807" y="130" class="chevron">&gt;</text>
  <text x="807" y="230" class="chevron">&gt;</text>
  <text x="807" y="330" class="chevron">&gt;</text>

  <g transform="translate(858 0)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafA"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardA"/>
    <text x="18" y="37" class="cardTitle">05</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">1</text>
  </g>

  <g transform="translate(858 74)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafA"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardA"/>
    <text x="18" y="37" class="cardTitle">06</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">2</text>
  </g>

  <g transform="translate(858 148)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafB"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardB"/>
    <text x="18" y="37" class="cardTitle">07</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">4</text>
  </g>

  <g transform="translate(858 222)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafB"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardB"/>
    <text x="18" y="37" class="cardTitle">08</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">5</text>
  </g>

  <g transform="translate(858 296)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafC"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardC"/>
    <text x="18" y="37" class="cardTitle">09</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">7</text>
  </g>

  <g transform="translate(858 370)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafD"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCardD"/>
    <text x="18" y="37" class="cardTitle">10</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">9</text>
  </g>

  <path d="M778 67 C810 40 828 30 858 30" class="treeLine"/>
  <path d="M778 67 C810 86 828 104 858 104" class="treeLine"/>
  <path d="M778 167 C810 160 828 178 858 178" class="treeLine"/>
  <path d="M778 167 C810 216 828 252 858 252" class="treeLine"/>
  <path d="M778 267 C810 292 828 326 858 326" class="treeLine"/>
  <path d="M778 267 C810 346 828 400 858 400" class="treeLine"/>

  <path d="M1032 30 C1082 30 1082 104 1032 104" class="leafLink"/>
  <path d="M1032 104 C1082 104 1082 178 1032 178" class="leafLink"/>
  <path d="M1032 178 C1082 178 1082 252 1032 252" class="leafLink"/>
  <path d="M1032 252 C1082 252 1082 326 1032 326" class="leafLink"/>
  <path d="M1032 326 C1082 326 1082 400 1032 400" class="leafLink"/>
</svg>
